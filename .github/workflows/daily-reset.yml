name: Daily Reset

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  run-reset:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily reset endpoint
        env:
          DAILY_RESET_URL: ${{ secrets.DAILY_RESET_URL }}
          INTERNAL_CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
        run: |
          if [ -z "$DAILY_RESET_URL" ] || [ -z "$INTERNAL_CRON_SECRET" ]; then
            echo "Missing DAILY_RESET_URL or INTERNAL_CRON_SECRET secret."
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "x-internal-secret: $INTERNAL_CRON_SECRET" \
            "$DAILY_RESET_URL/api/internal/daily-reset"
